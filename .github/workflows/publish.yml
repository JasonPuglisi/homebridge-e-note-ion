name: Publish

# Publishes to npm when a GitHub Release is published, gated on the release tag
# matching package.json. Uses npm trusted publishing (OIDC) — no NPM_TOKEN
# secret required, and provenance is generated automatically.
#
# One-time setup (run locally, requires npm login + 2FA). The --environment must
# match the `environment:` on the job below, so npm only accepts OIDC publishes
# from runs in that GitHub Environment:
#   npm trust github homebridge-e-note-ion \
#     --repo JasonPuglisi/homebridge-e-note-ion --file publish.yml \
#     --environment release --allow-publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org

      # Node 22.x ships npm 10.x; trusted publishing (OIDC) needs npm >= 11.5.1.
      - run: npm install -g npm@latest

      - name: Verify tag matches package version
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::package.json version ($PKG) does not match release tag ($TAG)"
            exit 1
          fi

      - run: npm ci

      - run: npm publish --access public
